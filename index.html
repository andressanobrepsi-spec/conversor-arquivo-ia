<!conversor html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gobots: Conversão Inteligente</title>
    
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap');
        
        body { font-family: 'Inter', sans-serif; }
        
        .custom-scrollbar::-webkit-scrollbar { width: 5px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: transparent; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #e2e8f0; border-radius: 20px; }
        .custom-scrollbar::-webkit-scrollbar-thumb:hover { background: #3b82f6; }
        
        @keyframes fade-in { 
            from { opacity: 0; transform: translateY(10px); } 
            to { opacity: 1; transform: translateY(0); } 
        }
        .animate-in { animation: fade-in 0.5s ease-out forwards; }
    </style>
</head>
<body class="bg-slate-50 text-slate-900">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useCallback } = React;

        // Componente de Ícone para compatibilidade com Lucide no navegador
        const Icon = ({ name, size = 24, className = "" }) => {
            const [iconHtml, setIconHtml] = useState("");
            
            useEffect(() => {
                if (window.lucide) {
                    const icon = window.lucide.icons[name];
                    if (icon) {
                        const svg = icon.toSvg({
                            width: size,
                            height: size,
                            class: className,
                            'stroke-width': 2
                        });
                        setIconHtml(svg);
                    }
                }
            }, [name, size, className]);

            return <span dangerouslySetInnerHTML={{ __html: iconHtml }} />;
        };

        const apiKey = ""; // Insira sua chave aqui

        const App = () => {
            const [files, setFiles] = useState([]);
            const [isProcessing, setIsProcessing] = useState(false);
            const [progress, setProgress] = useState(0);
            const [processingStatus, setProcessingStatus] = useState("");
            const [results, setResults] = useState([]);
            const [error, setError] = useState(null);
            const [step, setStep] = useState(1);
            const [libLoaded, setLibLoaded] = useState(false);

            useEffect(() => {
                const script = document.createElement('script');
                script.src = "https://cdn.sheetjs.com/xlsx-0.20.1/package/dist/xlsx.full.min.js";
                script.async = true;
                script.onload = () => setLibLoaded(true);
                document.head.appendChild(script);
            }, []);

            const COLUMNS = ["EAN", "SKU", "MLB", "O QUE ACOMPANHA O PRODUTO", "MEDIDAS", "COMPATIBILIDADE"];

            const onFileChange = (e) => {
                const selectedFiles = Array.from(e.target.files);
                if (files.length + selectedFiles.length > 200) {
                    setError("O limite máximo de processamento é de 200 arquivos.");
                    return;
                }
                setError(null);
                setFiles(prev => [...prev, ...selectedFiles]);
                if (step === 1) setStep(2);
                e.target.value = null;
            };

            const removeFile = (index) => {
                const newFiles = files.filter((_, i) => i !== index);
                setFiles(newFiles);
                if (newFiles.length === 0) setStep(1);
            };

            const extractDataFromAI = async (file) => {
                const reader = new FileReader();
                const fileData = await new Promise((resolve) => {
                    reader.onload = () => resolve(reader.result.split(',')[1]);
                    reader.readAsDataURL(file);
                });

                const systemPrompt = `Você é a inteligência Gobots. Extraia os campos: EAN, SKU, MLB, O QUE ACOMPANHA O PRODUTO (detalhado), MEDIDAS, COMPATIBILIDADE. Responda estritamente em JSON.`;

                const payload = {
                    contents: [{
                        parts: [
                            { text: "Converta os dados desta ficha técnica para o padrão Gobots." },
                            { inlineData: { mimeType: file.type || 'application/octet-stream', data: fileData } }
                        ]
                    }],
                    systemInstruction: { parts: [{ text: systemPrompt }] },
                    generationConfig: {
                        responseMimeType: "application/json",
                        responseSchema: {
                            type: "OBJECT",
                            properties: {
                                EAN: { type: "STRING" },
                                SKU: { type: "STRING" },
                                MLB: { type: "STRING" },
                                "O QUE ACOMPANHA O PRODUTO": { type: "STRING" },
                                MEDIDAS: { type: "STRING" },
                                COMPATIBILIDADE: { type: "STRING" }
                            }
                        }
                    }
                };

                const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.0-flash:generateContent?key=${apiKey}`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload)
                });
                const result = await response.json();
                return JSON.parse(result.candidates?.[0]?.content?.parts?.[0]?.text || "{}");
            };

            const startProcessing = async () => {
                setIsProcessing(true);
                setProgress(0);
                const allResults = [];
                for (let i = 0; i < files.length; i++) {
                    setProcessingStatus(`Processando: ${files[i].name}`);
                    try {
                        const data = await extractDataFromAI(files[i]);
                        allResults.push({ fileName: files[i].name, ...data });
                    } catch (err) {
                        allResults.push({ fileName: files[i].name, EAN: "Erro" });
                    }
                    setProgress(Math.round(((i + 1) / files.length) * 100));
                }
                setResults(allResults);
                setIsProcessing(false);
                setStep(3);
            };

            const downloadExcel = () => {
                const ws = XLSX.utils.json_to_sheet(results);
                const wb = XLSX.utils.book_new();
                XLSX.utils.book_append_sheet(wb, ws, "Dados");
                XLSX.writeFile(wb, "Gobots_Convertidos.xlsx");
            };

            return (
                <div className="min-h-screen pb-24">
                    <header className="bg-white border-b border-slate-200 px-8 py-5 sticky top-0 z-30 shadow-sm flex justify-between items-center">
                        <div className="flex items-center gap-4">
                            <div className="bg-blue-600 p-2.5 rounded-2xl shadow-lg rotate-3">
                                <Icon name="Zap" size={24} className="text-white" />
                            </div>
                            <div>
                                <h1 className="text-2xl font-black text-slate-900 leading-none">Gobots</h1>
                                <p className="text-[10px] font-black text-blue-600 uppercase tracking-widest mt-1">AI Data Converter</p>
                            </div>
                        </div>
                        {isProcessing && <span className="text-xs font-bold text-blue-600">{progress}% Processado</span>}
                    </header>

                    <main className="max-w-6xl mx-auto px-6 pt-10">
                        {step < 3 && (
                            <div className="grid grid-cols-1 lg:grid-cols-3 gap-12">
                                <div className="lg:col-span-2">
                                    <div className="border-2 border-dashed rounded-[48px] p-16 bg-white shadow-xl flex flex-col items-center relative">
                                        <input type="file" multiple onChange={onFileChange} className="absolute inset-0 opacity-0 cursor-pointer" />
                                        <Icon name="Files" size={48} className="text-blue-600 mb-6" />
                                        <h3 className="text-3xl font-black mb-2">Importar Fichas</h3>
                                        <p className="text-slate-400 mb-8">Arraste ou clique para selecionar</p>
                                        {files.length > 0 && (
                                            <button onClick={startProcessing} className="bg-blue-600 text-white font-black py-4 px-12 rounded-2xl shadow-xl hover:scale-105 transition-transform">
                                                Iniciar Conversão
                                            </button>
                                        )}
                                    </div>
                                </div>
                                <div className="bg-white rounded-[40px] shadow-lg border p-6 h-[500px] overflow-y-auto custom-scrollbar">
                                    <h4 className="font-black text-xs uppercase mb-4">Fila ({files.length})</h4>
                                    {files.map((f, i) => (
                                        <div key={i} className="flex justify-between items-center p-4 bg-slate-50 rounded-2xl mb-2">
                                            <span className="text-xs font-bold truncate max-w-[150px]">{f.name}</span>
                                            <button onClick={() => removeFile(i)} className="text-red-500"><Icon name="Trash2" size={16} /></button>
                                        </div>
                                    ))}
                                </div>
                            </div>
                        )}

                        {isProcessing && (
                            <div className="fixed inset-0 bg-slate-900/90 flex items-center justify-center z-50 text-white">
                                <div className="text-center">
                                    <div className="text-6xl font-black mb-4">{progress}%</div>
                                    <p className="animate-pulse">{processingStatus}</p>
                                </div>
                            </div>
                        )}

                        {step === 3 && (
                            <div className="animate-in space-y-8">
                                <div className="bg-slate-900 p-12 rounded-[48px] text-white flex justify-between items-center">
                                    <div>
                                        <h2 className="text-4xl font-black italic">Concluído!</h2>
                                        <p className="text-slate-400">Seus dados foram estruturados com sucesso.</p>
                                    </div>
                                    <div className="flex gap-4">
                                        <button onClick={() => setStep(1)} className="bg-white/10 px-8 py-4 rounded-2xl">Novo Lote</button>
                                        <button onClick={downloadExcel} className="bg-blue-600 px-8 py-4 rounded-2xl font-black">Baixar Excel</button>
                                    </div>
                                </div>
                                <div className="bg-white rounded-[40px] shadow-2xl overflow-hidden border border-slate-200">
                                    <div className="overflow-x-auto">
                                        <table className="w-full text-left">
                                            <thead className="bg-slate-50">
                                                <tr>
                                                    {COLUMNS.map(c => <th key={c} className="p-6 text-[10px] font-black uppercase">{c}</th>)}
                                                </tr>
                                            </thead>
                                            <tbody>
                                                {results.map((r, i) => (
                                                    <tr key={i} className="border-t border-slate-100 hover:bg-blue-50">
                                                        <td className="p-6 font-mono text-xs">{r.EAN}</td>
                                                        <td className="p-6 font-mono text-xs">{r.SKU}</td>
                                                        <td className="p-6 font-mono text-xs">{r.MLB}</td>
                                                        <td className="p-6 text-xs italic">{r["O QUE ACOMPANHA O PRODUTO"]}</td>
                                                        <td className="p-6 text-xs">{r.MEDIDAS}</td>
                                                        <td className="p-6 text-xs">{r.COMPATIBILIDADE}</td>
                                                    </tr>
                                                ))}
                                            </tbody>
                                        </table>
                                    </div>
                                </div>
                            </div>
                        )}
                    </main>

                    <footer className="mt-20 text-center text-slate-400 text-[10px] uppercase tracking-[0.5em]">
                        Gobots Inteligência Artificial &copy; 2026
                    </footer>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
