<!Educação da Ia em massa html>
<html lang="pt-PT">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gobots: Conversão de Dados para IA</title>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap');
        body { font-family: 'Inter', sans-serif; }
        .custom-scrollbar::-webkit-scrollbar { width: 5px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: transparent; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #e2e8f0; border-radius: 10px; }
        .custom-scrollbar::-webkit-scrollbar-thumb:hover { background: #3b82f6; }
    </style>
</head>
<body class="bg-slate-50 text-slate-900">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useCallback } = React;

        // --- ÍCONES SVG ---
        const IconZap = () => (
            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><polygon points="13 2 3 14 12 14 11 22 21 10 12 10 13 2"/></svg>
        );
        const IconUpload = () => (
            <svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg>
        );
        const IconFileText = () => (
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M14.5 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V7.5L14.5 2z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/><polyline points="10 9 9 9 8 9"/></svg>
        );
        const IconTrash = () => (
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><polyline points="3 6 5 6 21 6"/><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/></svg>
        );
        const IconDownload = () => (
            <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
        );
        const IconCheck = () => (
            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><polyline points="20 6 9 17 4 12"/></svg>
        );

        const App = () => {
            const [files, setFiles] = useState([]);
            const [isProcessing, setIsProcessing] = useState(false);
            const [progress, setProgress] = useState(0);
            const [results, setResults] = useState([]);
            const [step, setStep] = useState(1);
            const apiKey = ""; // Chave injetada pelo ambiente

            useEffect(() => {
                const script = document.createElement('script');
                script.src = "https://cdn.sheetjs.com/xlsx-0.20.1/package/dist/xlsx.full.min.js";
                script.async = true;
                document.head.appendChild(script);
            }, []);

            const COLUMNS = ["EAN", "SKU", "MLB", "O QUE ACOMPANHA O PRODUTO", "MEDIDAS", "COMPATIBILIDADE"];

            const onFileChange = (e) => {
                const selected = Array.from(e.target.files);
                if (files.length + selected.length > 200) return;
                setFiles(prev => [...prev, ...selected]);
                if (step === 1) setStep(2);
                e.target.value = null;
            };

            const removeFile = (idx) => {
                const updated = files.filter((_, i) => i !== idx);
                setFiles(updated);
                if (updated.length === 0) setStep(1);
            };

            const processWithAI = async (file) => {
                const reader = new FileReader();
                const base64 = await new Promise(r => {
                    reader.onload = () => r(reader.result.split(',')[1]);
                    reader.readAsDataURL(file);
                });

                const payload = {
                    contents: [{
                        parts: [
                            { text: "Extraia os dados técnicos desta ficha técnica: EAN, SKU, MLB, O QUE ACOMPANHA O PRODUTO (detalhando peso/gramagem), MEDIDAS, COMPATIBILIDADE." },
                            { inlineData: { mimeType: file.type || 'application/octet-stream', data: base64 } }
                        ]
                    }],
                    systemInstruction: { parts: [{ text: "Você é a IA Gobots. Retorne apenas JSON estruturado. Ignore 'IMPLEMENTADO'." }] },
                    generationConfig: {
                        responseMimeType: "application/json",
                        responseSchema: {
                            type: "OBJECT", properties: {
                                EAN: { type: "STRING" }, SKU: { type: "STRING" }, MLB: { type: "STRING" },
                                "O QUE ACOMPANHA O PRODUTO": { type: "STRING" }, MEDIDAS: { type: "STRING" }, COMPATIBILIDADE: { type: "STRING" }
                            }
                        }
                    }
                };

                const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-09-2025:generateContent?key=${apiKey}`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload)
                });
                const result = await response.json();
                return JSON.parse(result.candidates?.[0]?.content?.parts?.[0]?.text || "{}");
            };

            const startConversion = async () => {
                setIsProcessing(true); setProgress(0);
                const final = [];
                for (let i = 0; i < files.length; i++) {
                    try {
                        const data = await processWithAI(files[i]);
                        final.push({ fileName: files[i].name, ...data });
                    } catch {
                        final.push({ fileName: files[i].name, EAN: "Erro" });
                    }
                    setProgress(Math.round(((i + 1) / files.length) * 100));
                }
                setResults(final); setIsProcessing(false); setStep(3);
            };

            const downloadExcel = () => {
                if (!window.XLSX) return;
                const ws = XLSX.utils.json_to_sheet(results.map(r => ({ ...r, "IMPLEMENTADO": "" })));
                const wb = XLSX.utils.book_new();
                XLSX.utils.book_append_sheet(wb, ws, "Dados");
                XLSX.writeFile(wb, "Gobots_Dados.xlsx");
            };

            return (
                <div className="min-h-screen">
                    <header className="bg-white border-b p-5 sticky top-0 z-30 flex justify-between items-center shadow-sm">
                        <div className="flex items-center gap-3">
                            <div className="bg-blue-600 p-2 rounded-xl text-white"><IconZap /></div>
                            <div>
                                <h1 className="text-xl font-black tracking-tighter">Gobots</h1>
                                <p className="text-[10px] font-bold text-blue-600 uppercase tracking-widest">IA mais inteligente</p>
                            </div>
                        </div>
                    </header>

                    <main className="max-w-6xl mx-auto p-6 pt-10">
                        {step === 1 && (
                          <div className="bg-white p-8 rounded-[32px] border mb-10 shadow-sm">
                            <h2 className="text-xl font-black mb-6 italic">Fluxo Gobots</h2>
                            <div className="grid md:grid-cols-3 gap-6">
                              <div className="bg-slate-50 p-6 rounded-3xl">
                                <div className="text-2xl font-black text-blue-200">01</div>
                                <p className="font-bold text-slate-700">Importação</p>
                                <p className="text-xs text-slate-500">Até 200 ficheiros em massa.</p>
                              </div>
                              <div className="bg-slate-50 p-6 rounded-3xl">
                                <div className="text-2xl font-black text-blue-200">02</div>
                                <p className="font-bold text-slate-700">IA Ágil</p>
                                <p className="text-xs text-slate-500">Leitura técnica detalhada.</p>
                              </div>
                              <div className="bg-slate-50 p-6 rounded-3xl">
                                <div className="text-2xl font-black text-blue-200">03</div>
                                <p className="font-bold text-slate-700">Exportação</p>
                                <p className="text-xs text-slate-500">Pronto para o time de CX.</p>
                              </div>
                            </div>
                          </div>
                        )}

                        {step < 3 && (
                            <div className="grid grid-cols-1 lg:grid-cols-3 gap-10">
                                <div className="lg:col-span-2">
                                    <div className="relative border-2 border-dashed rounded-[48px] p-20 bg-white shadow-xl flex flex-col items-center text-center hover:border-blue-400 transition-all">
                                        <input type="file" multiple onChange={onFileChange} className="absolute inset-0 opacity-0 cursor-pointer z-10" disabled={isProcessing} />
                                        <div className="text-blue-600 mb-6"><IconUpload /></div>
                                        <h3 className="text-3xl font-black italic">Incluir Fichas Técnicas</h3>
                                        {files.length > 0 && !isProcessing && (
                                            <button onClick={startConversion} className="mt-8 bg-blue-600 text-white font-black py-4 px-12 rounded-[24px] shadow-xl hover:scale-105 transition-all">Converter {files.length} Ficheiros</button>
                                        )}
                                    </div>
                                </div>
                                <div className="bg-white rounded-[40px] border h-[500px] flex flex-col shadow-lg overflow-hidden">
                                    <div className="p-6 bg-slate-50 border-b font-black text-xs uppercase tracking-widest">Fila de Espera</div>
                                    <div className="flex-1 overflow-y-auto p-4 space-y-3 custom-scrollbar">
                                        {files.map((f, i) => (
                                            <div key={i} className="flex items-center justify-between p-4 bg-slate-50 rounded-2xl border group">
                                                <div className="flex items-center gap-3 truncate">
                                                    <div className="text-blue-500"><IconFileText /></div>
                                                    <span className="text-xs font-bold truncate">{f.name}</span>
                                                </div>
                                                <button onClick={() => removeFile(i)} className="text-slate-300 hover:text-red-500"><IconTrash /></button>
                                            </div>
                                        ))}
                                    </div>
                                </div>
                            </div>
                        )}

                        {isProcessing && (
                            <div className="fixed inset-0 bg-slate-900/95 backdrop-blur-xl z-[100] flex flex-col items-center justify-center text-white">
                                <div className="text-6xl font-black mb-4">{progress}%</div>
                                <p className="text-blue-400 font-bold uppercase tracking-widest text-xs">IA em ação...</p>
                            </div>
                        )}

                        {step === 3 && (
                            <div className="space-y-12 animate-in fade-in duration-700">
                                <div className="bg-slate-900 p-12 rounded-[64px] text-white flex flex-col md:flex-row justify-between items-center gap-10 shadow-2xl border border-white/5">
                                    <div>
                                        <h2 className="text-4xl font-black italic">Conversão Concluída <IconCheck /></h2>
                                        <p className="text-slate-400 mt-2">Dados estruturados com sucesso.</p>
                                    </div>
                                    <div className="flex gap-4">
                                        <button onClick={() => setStep(1)} className="bg-white/10 px-8 py-4 rounded-2xl font-bold">Novo Lote</button>
                                        <button onClick={downloadExcel} className="bg-blue-600 px-12 py-4 rounded-2xl font-black flex items-center gap-3"><IconDownload /> Baixar Excel</button>
                                    </div>
                                </div>

                                <div className="bg-blue-50 p-10 rounded-[48px] flex flex-col lg:flex-row items-center gap-8">
                                    <div className="flex-1 text-center lg:text-left text-blue-900">
                                        <h3 className="text-2xl font-black mb-1">Envio para Implementação</h3>
                                        <p className="text-sm font-medium">Envie este ficheiro para o time de CX através dos canais oficiais.</p>
                                    </div>
                                    <div className="flex gap-4">
                                        <a href="https://gobots.atlassian.net/servicedesk/customer/portal/7/group/29/create/10461" target="_blank" className="bg-white px-8 py-4 rounded-3xl border text-blue-900 font-bold hover:bg-blue-100">Ticket CX</a>
                                        <a href="https://api.whatsapp.com/send/?phone=551145024714" target="_blank" className="bg-[#25D366] px-8 py-4 rounded-3xl text-white font-black shadow-xl">WhatsApp</a>
                                    </div>
                                </div>

                                <div className="bg-white rounded-[56px] shadow-2xl border overflow-hidden">
                                    <div className="overflow-x-auto">
                                        <table className="w-full text-left text-sm">
                                            <thead>
                                                <tr className="bg-slate-50 border-b text-[10px] font-black uppercase text-slate-400">
                                                    <th className="px-10 py-6">Origem</th>
                                                    {COLUMNS.map(c => <th key={c} className="px-5 py-6 text-slate-900">{c}</th>)}
                                                </tr>
                                            </thead>
                                            <tbody>
                                                {results.map((r, i) => (
                                                    <tr key={i} className="border-b hover:bg-blue-50/20">
                                                        <td className="px-10 py-5 italic text-slate-400 text-xs truncate max-w-[150px]">{r.fileName}</td>
                                                        <td className="px-5 py-5 font-black font-mono text-blue-600">{r.EAN || '-'}</td>
                                                        <td className="px-5 py-5 font-black font-mono">{r.SKU || '-'}</td>
                                                        <td className="px-5 py-5 font-mono text-slate-400">{r.MLB || '-'}</td>
                                                        <td className="px-5 py-5 text-xs italic max-w-[250px]">{r["O QUE ACOMPANHA O PRODUTO"]}</td>
                                                        <td className="px-5 py-5 text-xs font-semibold">{r.MEDIDAS}</td>
                                                        <td className="px-5 py-5 text-[11px] text-slate-500">{r.COMPATIBILIDADE}</td>
                                                    </tr>
                                                ))}
                                            </tbody>
                                        </table>
                                    </div>
                                </div>
                            </div>
                        )}
                    </main>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
